meters:
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - source_ip
      - endpoint
    description: >-
      HTTP requests sent to any Airport Gap endpoint, counted per IP per minute against the
      100-request rate limit. No monetary cost; the meter is used purely for compliance monitoring.
principles:
  - name: Visibility
    description: >-
      Instrument your HTTP client or API gateway to count outbound requests to airportgap.com per minute
      per source IP. Surface the count in your observability stack to detect approaching the 100 req/min
      limit before a 429 response disrupts test runs or integrations.
  - name: Allocation
    description: >-
      If multiple teams or pipelines share an IP egress point, attribute Airport Gap request volume per
      team using HTTP client tagging or proxy logs. This prevents one pipeline from exhausting the shared
      rate limit window and impacting others.
  - name: Optimization
    description: >-
      Cache GET /airports and GET /airports/:id responses locally; airport data changes infrequently.
      Batch distance checks (POST /airports/distance) into the minimum number of calls. Spread parallel
      test suites across time windows or egress IPs to avoid rate-limit contention.
  - name: Accountability
    description: >-
      Designate an owner for any self-hosted Airport Gap deployment. Track infrastructure costs (compute,
      PostgreSQL) separately as internal FinOps line items if the instance runs in a paid cloud environment.
