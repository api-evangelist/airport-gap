description: >-
  Airport Gap is a free, open-source API with no monetary charges. FinOps concerns are limited
  to operational cost (self-hosting infrastructure if running a private instance) and rate-limit
  compliance. The service imposes a 100-requests-per-minute ceiling per IP; teams should track
  request volume to stay within limits and avoid 429 errors that would degrade automated test
  pipelines or production integrations.
